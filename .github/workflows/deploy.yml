# ============================================================
# LocalAI TV - GitHub Actions CI/CD
# Deploy to Hostinger VPS on push to main
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for GHCR image push
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # Security Tests
  # ============================================================
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scan
        run: |
          pip install bandit
          echo "Running Bandit on source files..."
          bandit -r . -ll \
            --exclude ./venv,./venv,./venv,./.venv,./__pycache__ \
            -f txt || true
          echo "Bandit scan complete"

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          patterns=(
            "password\s*=\s*['\"][^'\"]{8,}['\"]"
            "api_key\s*=\s*['\"]sk-[^'\"]{20,}['\"]"
            "secret\s*=\s*['\"][a-zA-Z0-9]{20,}['\"]"
            "AWS_SECRET_ACCESS_KEY\s*=\s*[A-Za-z0-9/+=]{40}"
          )
          for pattern in "${patterns[@]}"; do
            if grep -rqE "$pattern" --include="*.py" \
                --exclude-dir=venv --exclude-dir=.venv . 2>/dev/null; then
              echo "WARNING: Potential secret found matching: $pattern"
              grep -rE "$pattern" --include="*.py" \
                --exclude-dir=venv --exclude-dir=.venv . 2>/dev/null || true
            fi
          done
          echo "Secret check complete"

      - name: Check .gitignore
        run: |
          echo "Checking .gitignore for sensitive files..."
          REQUIRED_ENTRIES=(".env" "*.log" "__pycache__")
          for entry in "${REQUIRED_ENTRIES[@]}"; do
            if ! grep -q "^${entry}$" .gitignore 2>/dev/null; then
              echo "WARNING: $entry not found in .gitignore"
            fi
          done
          echo ".gitignore check complete"

      - name: Check docker-compose for secrets
        run: |
          echo "Checking docker-compose.yml for hardcoded secrets..."
          if grep -q "DATABASE_URL=postgresql://news-ai26" docker-compose.yml 2>/dev/null; then
            echo "ERROR: Hardcoded DATABASE_URL found in docker-compose.yml"
            exit 1
          fi
          echo "Docker compose security check passed"

  # ============================================================
  # Smoke Tests
  # ============================================================
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          echo "Checking Python syntax..."
          python3 -m py_compile webhook_server.py main.py config.py db.py 2>&1 || exit 1
          echo "Python syntax OK"

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          REQUIRED_FILES=(
            "Dockerfile"
            "docker-compose.yml"
            "docker-compose.prod.yml"
            "requirements.txt"
            "webhook_server.py"
            "main.py"
            "config.py"
            "db.py"
          )
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
          done
          echo "Required files check passed"

      - name: Check Dockerfile
        run: |
          echo "Checking Dockerfile..."
          if ! grep -q "^FROM" Dockerfile; then
            echo "ERROR: Dockerfile missing FROM instruction"
            exit 1
          fi
          echo "Dockerfile check passed"

      - name: Check docker-compose syntax
        run: |
          echo "Checking docker-compose syntax..."
          # Ubuntu 24.04 runners have Docker Compose v2 pre-installed.
          # We generate a dummy .env from .env.example so all ${VAR}
          # references resolve — no real secrets needed in CI.
          if [ -f ".env.example" ]; then
            sed 's/=.*/=dummy_ci_value/' .env.example > .env
            echo "Generated dummy .env from .env.example"
          else
            echo "WARNING: .env.example not found, creating minimal dummy .env"
            # Extract every ${VAR_NAME} reference from both compose files
            grep -ohP '\$\{\K[A-Z_0-9]+(?=[^}]*\})' \
              docker-compose.yml docker-compose.prod.yml 2>/dev/null \
              | sort -u \
              | awk '{print $0"=dummy_ci_value"}' > .env
          fi
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
          echo "docker-compose syntax OK"

      - name: Check environment variables template
        run: |
          echo "Checking .env.example..."
          if [ ! -f ".env.example" ]; then
            echo "WARNING: .env.example not found — create one to document required vars"
          else
            REQUIRED_VARS=("DATABASE_URL" "OPENAI_API_KEY" "S3_BUCKET_NAME")
            for var in "${REQUIRED_VARS[@]}"; do
              if ! grep -q "^${var}=" .env.example 2>/dev/null; then
                echo "WARNING: $var not in .env.example"
              fi
            done
            echo ".env.example check complete"
          fi

  # ============================================================
  # Build and Push Docker Image
  # ============================================================
  build:
    needs: [security, smoke-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable=true

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Hostinger VPS
  # ============================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=========================================="
            echo "Starting deployment..."
            echo "=========================================="

            # ── Install Docker if missing ──────────────────
            if ! command -v docker &>/dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
              echo "Docker installed"
            else
              echo "Docker OK: $(docker --version)"
            fi

            # ── Install Docker Compose v2 if missing ───────
            if ! docker compose version &>/dev/null; then
              echo "Docker Compose v2 not found — installing..."
              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -SL \
                https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "Docker Compose v2 installed"
            else
              echo "Docker Compose OK: $(docker compose version)"
            fi

            # ── App directories ────────────────────────────
            mkdir -p /root/localaitv1/{inputs/{images,videos,audios},outputs/{scripts,headlines,audios,reporters,item_video_cache,s3_inject_cache,bulletins},assets/ads}
            cd /root/localaitv1

            # ── .env guard ─────────────────────────────────
            if [ ! -f .env ]; then
              echo "ERROR: /root/localaitv1/.env not found."
              echo "SSH into the VPS and create it manually before deploying."
              exit 1
            fi

            if ! grep -qE '^[[:space:]]*DATABASE_URL=.+$' .env; then
              echo "ERROR: DATABASE_URL is missing or empty in /root/localaitv1/.env."
              echo "Add DATABASE_URL=... to the VPS .env file before deploying."
              exit 1
            fi

            # ── Pull latest docker-compose.prod.yml ────────
            curl -fsSL \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml" \
              -o docker-compose.prod.yml

            # ── Login to GHCR ──────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin || true

            # ── Pull & deploy ──────────────────────────────
            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker tag \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              localaitv:latest || true

            echo "Stopping existing container..."
            OLD_CID=$(docker ps -aq --filter "name=localaitv_app" 2>/dev/null || true)
            if [ -n "$OLD_CID" ]; then
              echo "Found existing container: $OLD_CID"
              docker kill -s SIGKILL $OLD_CID 2>/dev/null || true
              sleep 2
              docker rm -f $OLD_CID 2>/dev/null || true
              sleep 1
              REMOVED_CID=$(docker ps -aq --filter "name=localaitv_app" 2>/dev/null || true)
              if [ -n "$REMOVED_CID" ]; then
                echo "WARNING: Container still present after kill+rm. Using docker system prune..."
                docker rm -f $OLD_CID 2>/dev/null || true
                docker rm -f localaitv_app 2>/dev/null || true
              else
                echo "Container removed successfully."
              fi
            else
              echo "No existing container found."
            fi
            echo "Starting new container..."
            docker compose --env-file .env -f docker-compose.prod.yml config --quiet
            docker compose --env-file .env -f docker-compose.prod.yml up -d

            sleep 10
            docker ps | grep localaitv_app || echo "WARNING: container not running"

            docker image prune -f 2>/dev/null || true

            echo "=========================================="
            echo "Deployment complete!"
            echo "=========================================="

      - name: Verify deployment
        run: |
          sleep 15
          echo "Deployment done. Verify with:"
          echo "  curl http://${{ secrets.VPS_HOST }}:8001/health"
