# ============================================================
# LocalAI TV - Docker Compose (Production)
# Use this on your Hostinger VPS
# ============================================================

services:
  app:
    image: localaitv:latest
    container_name: localaitv_app
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - WATCH_DIR_BASE=/app/outputs/bulletins
      # Use external CloudSQL (your current setup)
      - DATABASE_URL=${DATABASE_URL}
      - DB_TYPE=postgres
      - USE_S3=true
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-2
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_BUCKET_NAME_M=${S3_BUCKET_NAME_M}
      - AWS_ACCESS_KEY_ID_M=${AWS_ACCESS_KEY_ID_M}
      - AWS_SECRET_ACCESS_KEY_M=${AWS_SECRET_ACCESS_KEY_M}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Model selection (was missing → container fell back to gemini-2.5-pro
      # default which returns empty/finish_reason=length on script+headline)
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # Vertex AI mode (GCP postpay) — opt-in. When GEMINI_USE_VERTEX is unset/false
      # the container behaves exactly as before (AI Studio mode). GOOGLE_APPLICATION_
      # CREDENTIALS must be the CONTAINER path of the mounted key (see volumes below).
      - GEMINI_USE_VERTEX=${GEMINI_USE_VERTEX:-false}
      - VERTEX_PROJECT=${VERTEX_PROJECT:-localaitv}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/app/adc.json}
      # Classified location bulletins (flag-gated, opt-in)
      - LOCATION_BULLETINS_ENABLED=${LOCATION_BULLETINS_ENABLED:-false}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_HEADLINE_MODEL=${OPENAI_HEADLINE_MODEL:-gpt-4o-mini}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - GOOGLE_TTS_API_KEY=${GOOGLE_TTS_API_KEY}
      - TTS_PROVIDER_DEFAULT=${TTS_PROVIDER_DEFAULT:-gcp}
      - TTS_PROVIDER_KURNOOL=${TTS_PROVIDER_KURNOOL:-gcp}
      - TTS_PROVIDER_KARIMNAGAR=${TTS_PROVIDER_KARIMNAGAR:-gcp}
      - TTS_PROVIDER_GUNTUR=${TTS_PROVIDER_GUNTUR:-gcp}
      - TTS_PROVIDER_WARANGAL=${TTS_PROVIDER_WARANGAL:-gcp}
      - TTS_PROVIDER_NALGONDA=${TTS_PROVIDER_NALGONDA:-gcp}
      - GUPSHUP_API_KEY=${GUPSHUP_API_KEY}
      - GUPSHUP_APP_NAME=${GUPSHUP_APP_NAME}
      - GUPSHUP_SOURCE_NUMBER=${GUPSHUP_SOURCE_NUMBER}
      - LOCALAITV_API_URL=${LOCALAITV_API_URL}
      - LOCALAITV_API_TOKEN=${LOCALAITV_API_TOKEN}
      - BULLETIN_API_TOKEN=${BULLETIN_API_TOKEN}
      - YOUTUBE_STREAMING_ENABLED=${YOUTUBE_STREAMING_ENABLED:-true}
      - YT_STREAM_KEY=${YT_STREAM_KEY}
      - STREAM_COUNT=${STREAM_COUNT}
      - YT_STREAM_KEY_KURNOOL=${YT_STREAM_KEY_KURNOOL}
      - YT_STREAM_KEY_KARIMNAGAR=${YT_STREAM_KEY_KARIMNAGAR}
      - YT_STREAM_KEY_ANATPUR=${YT_STREAM_KEY_ANATPUR}
      - YT_STREAM_KEY_KAKINADA=${YT_STREAM_KEY_KAKINADA}
      - YT_STREAM_KEY_NALORE=${YT_STREAM_KEY_NALORE}
      - YT_STREAM_KEY_TIRUPATI=${YT_STREAM_KEY_TIRUPATI}
      - YT_STREAM_KEY_GUNTUR=${YT_STREAM_KEY_GUNTUR}
      - YT_STREAM_KEY_WARANGAL=${YT_STREAM_KEY_WARANGAL}
      - YT_STREAM_KEY_NALGONDA=${YT_STREAM_KEY_NALGONDA}
      - ENABLE_PLANNER=${ENABLE_PLANNER:-true}
      - ENABLE_REPORT_POLLER=${ENABLE_REPORT_POLLER:-true}
      - ENABLE_RETRY=${ENABLE_RETRY:-true}
      - ENABLE_CLEANUP=${ENABLE_CLEANUP:-true}
      - TICKER_ENABLED=${TICKER_ENABLED:-true}
      - BGM_ENABLED=${BGM_ENABLED:-true}
    volumes:
      # Local storage — assets MUST be writable so ensure_assets() can sync
      # from S3 (anchors folder, stale-asset self-heal). The earlier duplicate
      # ':ro' mount made /app/assets read-only (last mount wins) → ensure_assets
      # crashed on startup (Read-only file system).
      - ./assets:/app/assets
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
      - ./news_intro.mpeg:/app/news_intro.mpeg:ro
      # Vertex AI credentials (SA key OR ADC). Host file /root/localaitv1/adc.json
      # → mounted read-only at /app/adc.json. Set in .env:
      #   GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json   (container path, NOT host)
      - ./adc.json:/app/adc.json:ro
    networks:
      - localaitv_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8001/health', timeout=5); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  streamer:
    image: localaitv:latest
    container_name: localaitv_streamer
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - PORT=8001
      - WATCH_DIR_BASE=/app/outputs/bulletins
      - DATABASE_URL=${DATABASE_URL}
      - DB_TYPE=postgres
      - USE_S3=true
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-2
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_BUCKET_NAME_M=${S3_BUCKET_NAME_M}
      - AWS_ACCESS_KEY_ID_M=${AWS_ACCESS_KEY_ID_M}
      - AWS_SECRET_ACCESS_KEY_M=${AWS_SECRET_ACCESS_KEY_M}
      # NotebookLM program bulletins streamer me bante hain → /api/bulletins POST
      # ke liye token chahiye (citizen bulletins jaise UI me dikhe)
      - LOCALAITV_API_URL=${LOCALAITV_API_URL}
      - LOCALAITV_API_TOKEN=${LOCALAITV_API_TOKEN}
      - BULLETIN_API_TOKEN=${BULLETIN_API_TOKEN}
      # Opt-in gate: notebooklm bulletin ko /api/bulletins (UI feed) pe bhejna.
      # true sirf prod me — local test me absent rehne se accidental POST nahi hota.
      - PROGRAM_BULLETIN_API_ENABLED=${PROGRAM_BULLETIN_API_ENABLED:-true}
      # Classified location bulletins (streamer reads this — gates the new flow)
      - LOCATION_BULLETINS_ENABLED=${LOCATION_BULLETINS_ENABLED:-false}
      - YOUTUBE_STREAMING_ENABLED=${YOUTUBE_STREAMING_ENABLED:-true}
      - YT_STREAM_KEY=${YT_STREAM_KEY}
      - STREAM_COUNT=${STREAM_COUNT}
      - YT_STREAM_KEY_KURNOOL=${YT_STREAM_KEY_KURNOOL}
      - YT_STREAM_KEY_KARIMNAGAR=${YT_STREAM_KEY_KARIMNAGAR}
      - YT_STREAM_KEY_ANATPUR=${YT_STREAM_KEY_ANATPUR}
      - YT_STREAM_KEY_KAKINADA=${YT_STREAM_KEY_KAKINADA}
      - YT_STREAM_KEY_NALORE=${YT_STREAM_KEY_NALORE}
      - YT_STREAM_KEY_TIRUPATI=${YT_STREAM_KEY_TIRUPATI}
      - YT_STREAM_KEY_GUNTUR=${YT_STREAM_KEY_GUNTUR}
      - YT_STREAM_KEY_WARANGAL=${YT_STREAM_KEY_WARANGAL}
      - YT_STREAM_KEY_NALGONDA=${YT_STREAM_KEY_NALGONDA}
    volumes:
      - ./outputs:/app/outputs
      - ./assets:/app/assets:ro
      - ./news_intro.mpeg:/app/news_intro.mpeg:ro
    networks:
      - localaitv_network
    command: ["python", "yt_streamer.py"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  localaitv_network:
    driver: bridge
